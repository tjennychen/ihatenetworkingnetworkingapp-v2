<script>
const vid = document.getElementById('vid');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// WebGL setup
const glCanvas = document.getElementById('glc');
const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');

function resizeGL() {
  glCanvas.width  = window.innerWidth;
  glCanvas.height = window.innerHeight;
  if (gl) gl.viewport(0, 0, glCanvas.width, glCanvas.height);
}
resizeGL();

// ── Shaders ──────────────────────────────────────────────────────────────────
const VS_SRC = `
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const FS_SRC = `
precision mediump float;
uniform float u_time;
uniform float u_speed;
uniform float u_cellScale;
uniform float u_pulse;
uniform float u_hueShift;
uniform vec2  u_resolution;
uniform vec2  u_motionXY;
uniform float u_intensity;

float voronoi(vec2 uv, float scale, float t) {
  uv *= scale;
  vec2 i = floor(uv);
  vec2 f = fract(uv);
  float minDist = 1.0;
  for (int x = -1; x <= 1; x++) {
    for (int y = -1; y <= 1; y++) {
      vec2 n    = vec2(float(x), float(y));
      vec2 cell = i + n;
      float seed = dot(cell, vec2(127.1, 311.7));
      vec2 center = 0.5 + 0.4 * vec2(
        sin(seed * 6.28318 + t),
        cos(seed * 5.17    + t)
      );
      minDist = min(minDist, length(n + center - f));
    }
  }
  return minDist;
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;

  float warp = 0.15 + u_intensity * 0.3;
  uv = mix(uv, u_motionXY, warp * 0.4);

  float t  = u_time * u_speed;
  float c1 = voronoi(uv, 5.0  * u_cellScale, t * 0.7);
  float c2 = voronoi(uv, 10.0 * u_cellScale, t * 1.1);
  float c3 = voronoi(uv, 20.0 * u_cellScale, t * 1.5);

  float A       = c1;
  float B       = mix(c2, c3, 0.5);
  float pulse   = sin(u_time * 1.2) * 0.5 + 0.5;
  float reaction = clamp((A - B + pulse * u_pulse * 0.3) * 2.0 + 0.5, 0.0, 1.0);
  reaction = mix(reaction, pow(reaction, 0.5), u_intensity * 0.6);

  vec3 colA  = vec3(0.05, 0.02, 0.0);
  vec3 colB  = vec3(1.0, 0.42 + u_hueShift * 0.2, 0.21);
  vec3 colC  = vec3(1.0, 0.85, 0.63);
  vec3 color = reaction < 0.5
    ? mix(colA, colB, reaction * 2.0)
    : mix(colB, colC, (reaction - 0.5) * 2.0);

  float edge    = 1.0 - smoothstep(0.0, 0.08, c1);
  color        += vec3(1.0, 0.5, 0.2) * edge * 0.6;

  vec2  vigUV   = uv - 0.5;
  float vignette = clamp(1.0 - dot(vigUV, vigUV) * 1.5, 0.0, 1.0);
  color *= vignette;

  gl_FragColor = vec4(color, 1.0);
}
`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function buildProgram() {
  const vs   = compileShader(gl.VERTEX_SHADER,   VS_SRC);
  const fs   = compileShader(gl.FRAGMENT_SHADER, FS_SRC);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
    return null;
  }
  return prog;
}

let glProg     = null;
let glUniforms = {};

function initGL() {
  if (!gl) return;
  glProg = buildProgram();
  if (!glProg) return;
  gl.useProgram(glProg);

  const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf   = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(glProg, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  glUniforms = {
    time:       gl.getUniformLocation(glProg, 'u_time'),
    speed:      gl.getUniformLocation(glProg, 'u_speed'),
    cellScale:  gl.getUniformLocation(glProg, 'u_cellScale'),
    pulse:      gl.getUniformLocation(glProg, 'u_pulse'),
    hueShift:   gl.getUniformLocation(glProg, 'u_hueShift'),
    resolution: gl.getUniformLocation(glProg, 'u_resolution'),
    motionXY:   gl.getUniformLocation(glProg, 'u_motionXY'),
    intensity:  gl.getUniformLocation(glProg, 'u_intensity'),
  };
}

initGL();

function drawGL() {
  if (!gl || !glProg) return;
  gl.uniform1f(glUniforms.time,       performance.now() / 1000);
  gl.uniform1f(glUniforms.speed,      parseFloat(document.getElementById('ctrl-speed')?.value  ?? 1.0));
  gl.uniform1f(glUniforms.cellScale,  parseFloat(document.getElementById('ctrl-scale')?.value  ?? 1.0));
  gl.uniform1f(glUniforms.pulse,      parseFloat(document.getElementById('ctrl-pulse')?.value  ?? 0.5));
  gl.uniform1f(glUniforms.hueShift,   parseFloat(document.getElementById('ctrl-hue')?.value    ?? 0.0));
  gl.uniform2f(glUniforms.resolution, glCanvas.width, glCanvas.height);
  gl.uniform2f(glUniforms.motionXY,   window.motionData?.x ?? 0.5, window.motionData?.y ?? 0.5);
  gl.uniform1f(glUniforms.intensity,  Math.min(1, (window.motionData?.intensity ?? 0) + gestureShaderBoost));
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

let landmarks = null; // 468 points [{x,y,z}] normalized 0-1
let handLandmarks = { left: null, right: null };
let poseLandmarks = null;
window.motionData = { x: 0.5, y: 0.5, intensity: 0 };
let gestureShaderBoost = 0;

// ── Emotion Detection State ───────────────────────────────────────────────────
// Smoothed scores (lerped, used for rendering)
const emotionScores = { anger: 0, joy: 0, worry: 0, grief: 0, fear: 0 };
// Raw target scores (updated every 500ms from face-api)
const emotionTargets = { anger: 0, joy: 0, worry: 0, grief: 0, fear: 0 };
let lastEmotionDetect = 0;
let emotionDetectionInFlight = false;
const EMOTION_LERP = 0.12;

let prevHandCentroid = null;

// Audio / Five Elements state
let audioCtx, analyser, freqData;
let elementLevels = { water: 0, wood: 0, fire: 0, earth: 0, metal: 0 };
let dominantElement = 'fire';

async function startAudio() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  source.connect(analyser);
  freqData = new Uint8Array(analyser.frequencyBinCount);
}

// Five Elements: map FFT bins to elements
// At 44100Hz sample rate, fftSize 2048 → binCount 1024, each bin = ~43Hz
function updateElements() {
  if (!analyser) return;
  analyser.getByteFrequencyData(freqData);
  const sampleRate = audioCtx.sampleRate;
  const binHz = sampleRate / analyser.fftSize;

  function bandAvg(loHz, hiHz) {
    const lo = Math.floor(loHz / binHz);
    const hi = Math.min(Math.floor(hiHz / binHz), freqData.length - 1);
    if (lo >= hi) return 0;
    let sum = 0;
    for (let i = lo; i <= hi; i++) sum += freqData[i];
    return sum / (hi - lo + 1) / 255; // normalize 0-1
  }

  elementLevels.water = bandAvg(20, 80);
  elementLevels.wood  = bandAvg(80, 250);
  elementLevels.fire  = bandAvg(250, 2000);
  elementLevels.earth = bandAvg(2000, 6000);
  elementLevels.metal = bandAvg(6000, 20000);

  dominantElement = Object.entries(elementLevels).sort((a, b) => b[1] - a[1])[0][0];
}

// Helper: convert normalized landmark to canvas coords
function lmToCanvas(lm) {
  return { x: lm.x * canvas.width, y: lm.y * canvas.height };
}

const ACUPOINTS = [
  { idx: 9,   name: 'Yintang',  code: 'EX-HN3', tip: 'Calms the Shen' },
  { idx: 50,  name: 'ST3',      code: 'ST3',     tip: 'Grounds earth chi' },
  { idx: 248, name: 'LI20',     code: 'LI20',    tip: 'Opens the lungs' },
  { idx: 55,  name: 'BL2',      code: 'BL2',     tip: 'Clears the head' },
  { idx: 352, name: 'TW23',     code: 'TW23',    tip: 'Harmonizes triple warmer' },
  { idx: 151, name: 'GV24',     code: 'GV24',    tip: 'Lifts the spirit' },
];

const ELEMENT_CONFIG = {
  water: { color: '#6B35FF', glowColor: 'rgba(107,53,255,', name: 'Water', organ: 'Kidney' },
  wood:  { color: '#35FF6B', glowColor: 'rgba(53,255,107,',  name: 'Wood',  organ: 'Liver'  },
  fire:  { color: '#FF4D1C', glowColor: 'rgba(255,77,28,',   name: 'Fire',  organ: 'Heart'  },
  earth: { color: '#FFB835', glowColor: 'rgba(255,184,53,',  name: 'Earth', organ: 'Spleen' },
  metal: { color: '#F0F0FF', glowColor: 'rgba(240,240,255,', name: 'Metal', organ: 'Lung'   },
};

const particles = [];
const MAX_PARTICLES = 400;

class Particle {
  constructor(x, y, element, meridianDir) {
    this.x = x;
    this.y = y;
    this.element = element;
    const cfg = ELEMENT_CONFIG[element];
    this.color = cfg.color;
    this.glowColor = cfg.glowColor;
    const angle = meridianDir + (Math.random() - 0.5) * 0.6;
    const speed = 0.8 + Math.random() * 1.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1.0;
    this.decay = 0.008 + Math.random() * 0.012;
    this.size = 2 + Math.random() * 3;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.life -= this.decay;
  }
  draw(ctx) {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.life * 0.85;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function spawnAmbientParticles() {
  if (particles.length >= MAX_PARTICLES * 0.3) return;
  const x = Math.random() * canvas.width;
  const y = canvas.height + 10;
  const el = ['fire', 'earth', 'metal'][Math.floor(Math.random() * 3)];
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
  const p = new Particle(x, y, el, angle);
  p.vy = -0.5 - Math.random();
  particles.push(p);
}

function spawnHandParticles() {
  const tips = [4, 8, 12, 16, 20];
  for (const side of ['left', 'right']) {
    const hand = handLandmarks[side];
    if (!hand) continue;
    for (const idx of tips) {
      if (particles.length >= MAX_PARTICLES) return;
      const pt = lmToCanvas(hand[idx]);
      const angle = Math.random() * Math.PI * 2;
      particles.push(new Particle(pt.x, pt.y, dominantElement, angle));
    }
  }
}

function spawnPoseParticles() {
  if (!poseLandmarks) return;
  const segments = [[11, 13], [13, 15], [12, 14], [14, 16]];
  for (const [a, b] of segments) {
    if (particles.length >= MAX_PARTICLES) break;
    const p0 = lmToCanvas(poseLandmarks[a]);
    const p1 = lmToCanvas(poseLandmarks[b]);
    const t  = Math.random();
    const sx = p0.x + (p1.x - p0.x) * t;
    const sy = p0.y + (p1.y - p0.y) * t;
    const angle = Math.atan2(p1.y - p0.y, p1.x - p0.x);
    particles.push(new Particle(sx, sy, dominantElement, angle));
  }
}

// ── Gesture Detection ────────────────────────────────────────────────────────
function isExtended(hand, tipIdx, baseIdx) {
  return hand[tipIdx].y < hand[baseIdx].y - 0.04;
}

function detectGesture(hand) {
  if (!hand) return null;
  const index  = isExtended(hand, 8,  6);
  const middle = isExtended(hand, 12, 10);
  const ring   = isExtended(hand, 16, 14);
  const pinky  = isExtended(hand, 20, 18);

  if (index && middle && ring && pinky) return 'open_palm';
  if (index && middle && !ring && !pinky) return 'peace';
  if (index && !middle && !ring && !pinky) return 'point';
  if (!index && !middle && !ring && !pinky) return 'fist';
  return null;
}

function detectBothHandsRaised() {
  if (!poseLandmarks) return false;
  return poseLandmarks[15].y < poseLandmarks[11].y &&
         poseLandmarks[16].y < poseLandmarks[12].y;
}

function detectNamaste() {
  if (!handLandmarks.left || !handLandmarks.right) return false;
  const dx = handLandmarks.left[0].x - handLandmarks.right[0].x;
  const dy = handLandmarks.left[0].y - handLandmarks.right[0].y;
  return Math.sqrt(dx * dx + dy * dy) < 0.1;
}

function processGestures() {
  const leftGesture  = detectGesture(handLandmarks.left);
  const rightGesture = detectGesture(handLandmarks.right);
  let gesture = rightGesture || leftGesture;

  if (detectBothHandsRaised()) gesture = 'both_raised';
  if (detectNamaste()) gesture = 'namaste';

  if (gesture !== activeGesture) {
    activeGesture = gesture;
    if (gesture) triggerGestureEffect(gesture);
  }
}

function triggerGestureEffect(gesture) {
  const readingEl = document.getElementById('reading-text');
  if (readingEl && GESTURE_READINGS[gesture]) {
    readingEl.textContent = GESTURE_READINGS[gesture];
    clearTimeout(gestureReadingTimer);
    gestureReadingTimer = setTimeout(() => {
      const cfg = ELEMENT_UI[dominantElement];
      if (cfg && readingEl) readingEl.textContent = cfg.readings[lastReadingIdx];
    }, 3000);
  }

  switch (gesture) {
    case 'open_palm':
      gestureShaderBoost = 0.8;
      for (let i = 0; i < 30 && particles.length < MAX_PARTICLES; i++) {
        const x = Math.random() * canvas.width;
        const p = new Particle(x, 0, 'earth', Math.PI / 2 + (Math.random() - 0.5) * 0.3);
        p.vy = 0.8 + Math.random();
        particles.push(p);
      }
      break;

    case 'peace':
      gestureShaderBoost = 0.5;
      ['left', 'right'].forEach(side => {
        const hand = handLandmarks[side];
        if (!hand) return;
        const pt = lmToCanvas(hand[9]);
        for (let i = 0; i < 15 && particles.length < MAX_PARTICLES; i++) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
          particles.push(new Particle(pt.x, pt.y, 'wood', angle));
        }
      });
      break;

    case 'point': {
      gestureShaderBoost = 0.3;
      const hand = handLandmarks.right || handLandmarks.left;
      if (hand) {
        const tip  = lmToCanvas(hand[8]);
        const base = lmToCanvas(hand[6]);
        const angle = Math.atan2(tip.y - base.y, tip.x - base.x);
        for (let i = 0; i < 20 && particles.length < MAX_PARTICLES; i++) {
          particles.push(new Particle(tip.x, tip.y, dominantElement, angle + (Math.random() - 0.5) * 0.2));
        }
      }
      break;
    }

    case 'fist':
      gestureShaderBoost = 1.0;
      ['left', 'right'].forEach(side => {
        const hand = handLandmarks[side];
        if (!hand) return;
        const pt = lmToCanvas(hand[9]);
        for (let i = 0; i < 20 && particles.length < MAX_PARTICLES; i++) {
          const startX = pt.x + (Math.random() - 0.5) * 200;
          const startY = pt.y + (Math.random() - 0.5) * 200;
          const angle = Math.atan2(pt.y - startY, pt.x - startX);
          particles.push(new Particle(startX, startY, 'water', angle));
        }
      });
      break;

    case 'both_raised':
      gestureShaderBoost = 0.6;
      yangScore = Math.min(100, yangScore + 30);
      break;

    case 'namaste':
      gestureShaderBoost = 0.4;
      yangScore = yangScore * 0.7 + 50 * 0.3;
      break;
  }
}

function drawAcupoints(time) {
  if (!landmarks) return;
  const pulse = (Math.sin(time / 400) + 1) / 2;
  const audioBoost = (elementLevels.fire + elementLevels.earth) * 2;

  ACUPOINTS.forEach(ap => {
    const pt = lmToCanvas(landmarks[ap.idx]);
    const radius = 5 + pulse * 4 + audioBoost * 6;

    ctx.save();
    ctx.globalAlpha = 0.3 + pulse * 0.4;
    ctx.strokeStyle = '#FF6B35';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#FF6B35';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = 0.8 + pulse * 0.2;
    ctx.fillStyle = '#FFD700';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.5 + pulse * 0.3;
    ctx.fillStyle = '#FFB88A';
    ctx.font = '7px IBM Plex Mono';
    ctx.fillText(ap.code, pt.x + 8, pt.y + 3);
    ctx.restore();
  });
}

function updateYinYang() {
  if (!landmarks) return;
  const nose = lmToCanvas(landmarks[4]);

  if (prevNoseX !== null) {
    const dx = nose.x - prevNoseX;
    const dy = nose.y - prevNoseY;
    const velocity = Math.sqrt(dx * dx + dy * dy);

    const targetYang = Math.min(100, velocity * 10);
    yangScore = yangScore * 0.92 + targetYang * 0.08;

    stillFrames = velocity < 0.5 ? stillFrames + 1 : 0;
  }

  prevNoseX = nose.x;
  prevNoseY = nose.y;
}

function drawYinYangMeter() {
  const cx = canvas.width / 2;
  const cy = canvas.height - 60;
  const r = 50;
  const startAngle = Math.PI + 0.3;
  const total = Math.PI * 2 - 0.6;

  ctx.save();

  // Background arc
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, startAngle + total);
  ctx.stroke();

  // Yang fill
  const fillEnd = startAngle + (yangScore / 100) * total;
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = yangScore > 70 ? '#FF4D1C' : yangScore < 30 ? '#6B35FF' : '#FFB835';
  ctx.shadowColor = ctx.strokeStyle;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, fillEnd);
  ctx.stroke();

  // Labels
  ctx.globalAlpha = 0.5;
  ctx.shadowBlur = 0;
  ctx.font = '7px IBM Plex Mono';
  ctx.fillStyle = '#6B35FF';
  ctx.fillText('YIN', cx - r - 20, cy + 5);
  ctx.fillStyle = '#FF4D1C';
  ctx.fillText('YANG', cx + r + 4, cy + 5);

  // Status text
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#FFB88A';
  ctx.font = '8px IBM Plex Mono';
  ctx.textAlign = 'center';
  const status = yangScore > 70 ? 'excess yang — breathe' : yangScore < 30 ? 'stagnant qi — move' : 'balanced chi';
  ctx.fillText(status, cx, cy + 20);
  ctx.textAlign = 'left';

  ctx.restore();
}

function updateMotionData() {
  const pts = [];
  if (handLandmarks.left)  pts.push(...handLandmarks.left);
  if (handLandmarks.right) pts.push(...handLandmarks.right);
  if (pts.length === 0 && landmarks) pts.push(landmarks[4]); // fallback: nose

  if (pts.length === 0) return;

  const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
  const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;

  let intensity = 0;
  if (prevHandCentroid) {
    const dx = cx - prevHandCentroid.x;
    const dy = cy - prevHandCentroid.y;
    intensity = Math.min(1, Math.sqrt(dx * dx + dy * dy) * 20);
  }
  prevHandCentroid = { x: cx, y: cy };

  window.motionData = {
    x: cx,
    y: 1 - cy,
    intensity: (window.motionData.intensity || 0) * 0.85 + intensity * 0.15,
  };
}

async function runEmotionDetection() {
  if (!faceApiReady || emotionDetectionInFlight) return;
  const now = Date.now();
  if (now - lastEmotionDetect < 500) return;
  lastEmotionDetect = now;
  emotionDetectionInFlight = true;

  try {
    const result = await faceapi
      .detectSingleFace(vid, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.3 }))
      .withFaceExpressions();

    if (!result) {
      // No face — decay targets toward zero
      for (const k in emotionTargets) emotionTargets[k] *= 0.8;
      return;
    }

    const e = result.expressions;
    // Map face-api 7 expressions → 5 TCM emotions
    emotionTargets.anger = e.angry;
    emotionTargets.joy   = e.happy;
    emotionTargets.grief = (e.sad + e.disgusted) / 2;
    emotionTargets.fear  = e.fearful;
    emotionTargets.worry = e.surprised;
  } catch (err) {
    // Silently ignore — detection errors are transient
  } finally {
    emotionDetectionInFlight = false;
  }
}

function checkChiScan() {
  if (stillFrames >= STILL_THRESHOLD && !chiScanActive && landmarks) {
    chiScanActive = true;
    chiScanFrame = 0;

    ACUPOINTS.forEach(ap => {
      const pt = lmToCanvas(landmarks[ap.idx]);
      for (let i = 0; i < 15 && particles.length < MAX_PARTICLES; i++) {
        const angle = Math.random() * Math.PI * 2;
        particles.push(new Particle(pt.x, pt.y, dominantElement, angle));
      }
    });

}

function drawChiScan() {
  if (!chiScanActive) return;
  chiScanFrame++;
  const progress = chiScanFrame / CHI_SCAN_FRAMES;
  const cfg = ELEMENT_CONFIG[dominantElement];

  if (progress < 0.5) {
    const r = progress * 2 * Math.min(canvas.width, canvas.height) * 0.6;
    ctx.save();
    ctx.globalAlpha = (1 - progress * 2) * 0.3;
    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = 3;
    ctx.shadowColor = cfg.color;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  if (chiScanFrame === 20 || chiScanFrame === 40) {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = cfg.color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  if (chiScanFrame >= CHI_SCAN_FRAMES) chiScanActive = false;
}

// ── Emotion Radar Chart ───────────────────────────────────────────────────────
const radarCanvas = document.getElementById('emotion-radar');
const radarCtx = radarCanvas ? radarCanvas.getContext('2d') : null;
if (radarCanvas) { radarCanvas.width = 180; radarCanvas.height = 180; }

const RADAR_EMOTIONS = [
  { key: 'anger', zh: '怒', en: 'Anger'  },
  { key: 'joy',   zh: '喜', en: 'Joy'    },
  { key: 'grief', zh: '悲', en: 'Grief'  },
  { key: 'fear',  zh: '恐', en: 'Fear'   },
  { key: 'worry', zh: '思', en: 'Worry'  },
];

function drawEmotionRadar() {
  if (!radarCtx) return;

  const W = 180, H = 180;

  const cx = W / 2, cy = H / 2;
  const R  = 68;
  const N  = RADAR_EMOTIONS.length;

  radarCtx.clearRect(0, 0, W, H);

  // Draw grid rings
  [0.33, 0.66, 1.0].forEach(frac => {
    radarCtx.save();
    radarCtx.globalAlpha = 0.15;
    radarCtx.strokeStyle = '#FF6B35';
    radarCtx.lineWidth = 0.5;
    radarCtx.beginPath();
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
      const x = cx + Math.cos(angle) * R * frac;
      const y = cy + Math.sin(angle) * R * frac;
      i === 0 ? radarCtx.moveTo(x, y) : radarCtx.lineTo(x, y);
    }
    radarCtx.closePath();
    radarCtx.stroke();
    radarCtx.restore();
  });

  // Draw axis lines + labels
  RADAR_EMOTIONS.forEach((em, i) => {
    const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
    const tipX  = cx + Math.cos(angle) * R;
    const tipY  = cy + Math.sin(angle) * R;

    radarCtx.save();
    radarCtx.globalAlpha = 0.25;
    radarCtx.strokeStyle = '#FF6B35';
    radarCtx.lineWidth = 0.5;
    radarCtx.beginPath();
    radarCtx.moveTo(cx, cy);
    radarCtx.lineTo(tipX, tipY);
    radarCtx.stroke();
    radarCtx.restore();

    const labelX = cx + Math.cos(angle) * (R + 14);
    const labelY = cy + Math.sin(angle) * (R + 14);
    const score  = emotionScores[em.key];
    const alpha  = 0.35 + score * 0.65;

    radarCtx.save();
    radarCtx.globalAlpha = alpha;
    radarCtx.fillStyle = '#FF6B35';
    radarCtx.font = 'bold 9px IBM Plex Mono';
    radarCtx.textAlign = 'center';
    radarCtx.textBaseline = 'middle';
    radarCtx.fillText(em.zh, labelX, labelY - 5);
    radarCtx.font = '6px IBM Plex Mono';
    radarCtx.globalAlpha = alpha * 0.7;
    radarCtx.fillText(em.en, labelX, labelY + 5);
    radarCtx.restore();
  });

  // Cache vertex positions to avoid duplicate calculation
  const vertexPositions = RADAR_EMOTIONS.map((em, i) => {
    const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
    const r = Math.max(0.05, emotionScores[em.key]) * R;
    return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r, score: emotionScores[em.key] };
  });

  // Draw filled polygon
  radarCtx.save();
  radarCtx.beginPath();
  vertexPositions.forEach(({ x, y }, i) => {
    i === 0 ? radarCtx.moveTo(x, y) : radarCtx.lineTo(x, y);
  });
  radarCtx.closePath();
  radarCtx.fillStyle = 'rgba(255,107,53,0.18)';
  radarCtx.fill();
  radarCtx.strokeStyle = 'rgba(255,107,53,0.7)';
  radarCtx.lineWidth = 1.5;
  radarCtx.shadowColor = '#FF6B35';
  radarCtx.shadowBlur = 6;
  radarCtx.stroke();
  radarCtx.restore();

  // Draw dots at each vertex
  vertexPositions.forEach(({ x, y, score }, i) => {
    radarCtx.save();
    radarCtx.globalAlpha = 0.6 + score * 0.4;
    radarCtx.fillStyle = '#FF6B35';
    radarCtx.shadowColor = '#FF6B35';
    radarCtx.shadowBlur = score > 0.3 ? 8 : 2;
    radarCtx.beginPath();
    radarCtx.arc(x, y, 2.5, 0, Math.PI * 2);
    radarCtx.fill();
    radarCtx.restore();
  });
}

function render() {
  drawGL();

  for (const k in emotionScores) {
    emotionScores[k] = emotionScores[k] * (1 - EMOTION_LERP) + emotionTargets[k] * EMOTION_LERP;
  }
  // Trigger async detection (non-blocking)
  runEmotionDetection();
  updateElements();

  // Fade trail
  ctx.fillStyle = 'rgba(13, 5, 0, 0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Spawn particles
  if (!landmarks) {
    if (Math.random() < 0.2) spawnAmbientParticles();
  }
  if (Math.random() < 0.3) spawnHandParticles();
  if (Math.random() < 0.2) spawnPoseParticles();

  // Update + draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw(ctx);
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  drawAcupoints(Date.now());
  updateYinYang();
  processGestures();
  if (gestureShaderBoost > 0.001) gestureShaderBoost *= 0.97;
  else gestureShaderBoost = 0;
  drawYinYangMeter();
  updateUI();
  checkChiScan();
  drawChiScan();
  drawEmotionRadar();
  updateEmotionPanel();

  requestAnimationFrame(render);
}
